substitutions:
  ref: main

esphome:
  name: test-rmt-pwm-esp32-s3-ard
  friendly_name: Test LD2410S Component with ESP32-S3 and Arduino Framework

esp32:
  variant: ESP32C3
  framework:
    type: arduino

external_components:
  source:
    type: git
    url: https://github.com/mikelawrence/esphome-components-esp32-rmt-pwm
    ref: ${ref}

output:
  - platform: esp32_rmt_pwm
    id: fan_pwm_output
    pin: GPIO4
    frequency: 25kHz
    rmt_symbols: 96

fan:
  - platform: speed
    name: "RMT PWM Fan"
    output: fan_pwm_output
    speed_count: 3
